<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - CardIA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <h2>Créer un compte</h2>
                <p>Inscription sur CardIA</p>
            </div>
            <div class="auth-body">
                {% if error %}
                    <div class="alert-error">{{ error }}</div>
                {% endif %}

                <form method="POST" id="registerForm">
                    <div class="auth-field">
                        <label>Nom complet</label>
                        <input type="text" name="name" required placeholder="NOM COMPLET">
                    </div>
                    <div class="auth-field">
                        <label>Email</label>
                        <input type="email" name="email" required placeholder="votre@email.com">
                    </div>
                    <div class="auth-field">
                        <label>Mot de passe</label>
                        <input type="password" name="password" required placeholder="••••••••">
                    </div>
                    <div class="auth-field">
                        <label>Je suis</label>
                        <select name="role" id="roleSelect" onchange="toggleBirthDate()">
                            <option value="doctor">Médecin</option>
                            <option value="patient">Patient</option>
                        </select>
                    </div>

                    <!-- Date de naissance : visible uniquement pour les patients -->
                    <div class="auth-field birth-group" id="birthDateGroup" style="display:none;">
                        <label>
                            Date de naissance <span style="color:var(--danger);">*</span>
                        </label>
                        <input type="date" name="birth_date" id="birthDateInput">
                        <div class="field-hint">Utilisée pour le calcul de risque cardiovasculaire.</div>
                    </div>

                    <button type="submit" class="btn-primary" style="width:100%; padding:16px; font-size:15px;">
                        S'inscrire
                    </button>
                </form>

                <div class="auth-divider"><span>ou</span></div>

                <p style="text-align:center; font-size:14px; color:var(--text-soft);">
                    Déjà un compte ?
                    <a href="{{ url_for('login') }}" class="auth-link">Se connecter</a>
                </p>
            </div>
        </div>
    </div>

    <script>
    function toggleBirthDate() {
        const role = document.getElementById('roleSelect').value;
        const group = document.getElementById('birthDateGroup');
        const input = document.getElementById('birthDateInput');

        if (role === 'patient') {
            group.style.display = 'block';
            input.required = true;
        } else {
            group.style.display = 'none';
            input.required = false;
            input.value = '';
        }
    }

    // Initialiser au chargement (médecin par défaut = caché)
    toggleBirthDate();
    </script>
</body>
</html>
