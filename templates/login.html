<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Digital Twin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <h2>Jumeau Numérique Cardiaque</h2>
                <p>Connexion à votre espace</p>
            </div>
            <div class="auth-body">
                {% if error %}
                    <div class="alert-error">{{ error }}</div>
                {% endif %}

                <form method="POST">
                    <div class="auth-field">
                        <label>Email</label>
                        <input type="email" name="email" required placeholder="votre@email.com">
                    </div>
                    <div class="auth-field">
                        <label>Mot de passe</label>
                        <input type="password" name="password" required placeholder="••••••••">
                    </div>
                    <div class="auth-field">
                        <label>Je suis</label>
                        <select name="role">
                            <option value="doctor"> Médecin</option>
                            <option value="patient"> Patient</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary" style="width:100%; padding:16px; font-size:15px;">
                        Se connecter
                    </button>
                </form>

                <div class="auth-divider"><span>ou</span></div>

                <p style="text-align:center; font-size:14px; color:var(--text-soft);">
                    Pas de compte ?
                    <a href="{{ url_for('register') }}" class="auth-link">S'inscrire</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
