<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changer mot de passe - Digital Twin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- TOPBAR -->
  <div class="topbar">
        <a href="/" class="topbar-home"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;flex-shrink:0;"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Accueil</a>
        <span class="topbar-user"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;flex-shrink:0;"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> {{ current_user.name }}</span>
        <a href="/change-password" class="topbar-link"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;flex-shrink:0;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg> Mot de passe</a>
        <a href="/logout" class="topbar-link-danger"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;flex-shrink:0;"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Déconnexion</a>
    </div>
<div class="auth-wrapper">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <h2> Changer le mot de passe</h2>
                <p>{{ current_user.name }}</p>
            </div>
            <div class="auth-body">

                {% if success %}
                <div style="background:#f0fdf4; border:1px solid #86efac; border-radius:8px; padding:12px 16px; margin-bottom:16px; color:#166534; font-size:14px;">
                     {{ success }}
                </div>
                {% endif %}

                {% if error %}
                <div class="alert-error">{{ error }}</div>
                {% endif %}

                <form method="POST" id="changePasswordForm">
                    <div class="auth-field">
                        <label>Mot de passe actuel</label>
                        <input type="password" name="current_password" required placeholder="••••••••">
                    </div>
                    <div class="auth-field">
                        <label>Nouveau mot de passe</label>
                        <input type="password" name="new_password" id="newPwd" required placeholder="••••••••" minlength="6">
                    </div>
                    <div class="auth-field">
                        <label>Confirmer le nouveau mot de passe</label>
                        <input type="password" name="confirm_password" id="confirmPwd" required placeholder="••••••••" minlength="6">
                    </div>

                    <div id="pwdError" style="color:#dc2626; font-size:12px; margin-bottom:8px; display:none;">
                        Les mots de passe ne correspondent pas.
                    </div>

                    <button type="submit" class="btn-primary" style="width:100%; padding:14px; font-size:15px;">
                         Enregistrer le nouveau mot de passe
                    </button>
                </form>

                <div style="text-align:center; margin-top:16px;">
                    <a href="/" class="auth-link" style="font-size:14px; color:var(--text-soft);">← Retour à l'accueil</a>
                </div>
            </div>
        </div>
    </div>

    <!-- pwd validation in script.js -->
</body>
</html>
